<body class="antialiased">
  <div id="root">
    <!-- Premium iFlexPDF Preloader -->
    <style>
      .iflex-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .iflex-loader-spinner {
        width: 44px;
        height: 44px;
        border: 4.5px solid #f1f5f9;
        border-top: 4.5px solid #0047AB;
        border-radius: 50%;
        animation: iflex-spin 0.75s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        margin-bottom: 22px;
      }
      .iflex-loader-text {
        font-size: 18px;
        font-weight: 900;
        color: #0f172a;
        letter-spacing: -0.03em;
      }
      .iflex-loader-sub {
        font-size: 10px;
        font-weight: 800;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-top: 8px;
      }
      @keyframes iflex-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <div class="iflex-preloader">
      <div class="iflex-loader-spinner"></div>
      <div class="iflex-loader-text">iFlexPDF<span style="color: #0047AB">.</span></div>
